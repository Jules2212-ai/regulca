<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — RégulCA</title>
<link rel="stylesheet" href="/static/base.css">
<link rel="stylesheet" href="/static/style.css">
<style>
  /* Page de login */
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--color-bg);
    padding: 1rem;
  }
  .login-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
  }
  .login-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }
  .login-logo svg {
    color: var(--color-primary);
  }
  .login-logo span {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--color-text);
  }
  .login-title {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--color-text-secondary);
    margin-bottom: 1.5rem;
  }
  .login-field {
    margin-bottom: 1rem;
  }
  .login-field label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--color-text);
    margin-bottom: 0.375rem;
  }
  .login-field input {
    width: 100%;
    padding: 0.625rem 0.75rem;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    font-size: 0.9375rem;
    background: var(--color-bg);
    color: var(--color-text);
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .login-field input:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
  }
  .login-btn {
    width: 100%;
    padding: 0.75rem;
    border: none;
    border-radius: 8px;
    background: var(--color-primary);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }
  .login-btn:hover {
    opacity: 0.9;
  }
  .login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .login-error {
    background: var(--color-danger-bg, #fef2f2);
    color: var(--color-danger, #dc2626);
    border: 1px solid var(--color-danger, #dc2626);
    border-radius: 8px;
    padding: 0.625rem 0.75rem;
    font-size: 0.875rem;
    margin-bottom: 1rem;
    display: none;
  }
  .login-error.visible {
    display: block;
  }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="RégulCA Logo">
        <rect x="2" y="2" width="32" height="32" rx="6" stroke="currentColor" stroke-width="2.5" fill="none"/>
        <path d="M9 11h8a5 5 0 0 1 0 10h-3l6 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="26" cy="26" r="3.5" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M24.5 26l3 0M26 24.5l0 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>RégulCA</span>
    </div>
    <p class="login-title">Connectez-vous pour accéder au module réglementaire</p>
    <div class="login-error" id="login-error">Identifiants incorrects</div>
    <form id="login-form" autocomplete="on">
      <div class="login-field">
        <label for="username">Identifiant</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="login-field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Se connecter</button>
    </form>
  </div>
</div>
<script>
(function () {
  "use strict";
  // Si déjà connecté, vérifier le token et rediriger
  var token = localStorage.getItem("regulca_token");
  if (token) {
    fetch("/api/auth/me", {
      headers: { "Authorization": "Bearer " + token }
    }).then(function (r) {
      if (r.ok) window.location.href = "/";
    }).catch(function () {});
  }

  var form = document.getElementById("login-form");
  var errorBox = document.getElementById("login-error");
  var btn = document.getElementById("login-btn");

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    errorBox.classList.remove("visible");
    btn.disabled = true;
    btn.textContent = "Connexion...";

    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value;

    fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: username, password: password })
    }).then(function (r) {
      if (!r.ok) throw new Error("login_failed");
      return r.json();
    }).then(function (data) {
      localStorage.setItem("regulca_token", data.token);
      window.location.href = "/";
    }).catch(function () {
      errorBox.textContent = "Identifiants incorrects";
      errorBox.classList.add("visible");
      btn.disabled = false;
      btn.textContent = "Se connecter";
    });
  });
})();
</script>
</body>
</html>
